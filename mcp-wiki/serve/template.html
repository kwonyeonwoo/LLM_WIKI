<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CV / Physical AI LLM Wiki</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Agent provider preset (provider/model/endpoint, NEVER an API key).
     Local copy may set Claude; the committed repo ships agent-config.example.js blank.
     build_site.py copies agent-config.js into site/ (falls back to the blank example). -->
<script src="agent-config.js"></script>
<style>
  :root { --cv:#2563eb; --physical-ai:#16a34a; --intersection:#db2777; --meta:#6b7280; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; color:#1f2937; display:flex; height:100vh; }
  #sidebar { width:280px; border-right:1px solid #e5e7eb; padding:12px; overflow-y:auto; }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #toolbar { padding:8px 12px; border-bottom:1px solid #e5e7eb; display:flex; gap:8px; align-items:center; }
  #content { flex:1; display:flex; min-height:0; }
  #graph { flex:1; }
  #page { flex:1; padding:20px 28px; overflow-y:auto; display:none; }
  #search { flex:1; padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; }
  button { padding:6px 10px; border:1px solid #d1d5db; background:#fff; border-radius:6px; cursor:pointer; }
  button.active { background:#111827; color:#fff; }
  .nav-item { padding:4px 6px; border-radius:4px; cursor:pointer; font-size:14px; }
  .nav-item:hover { background:#f3f4f6; }
  .group-label { font-weight:600; font-size:12px; text-transform:uppercase; color:#6b7280; margin:10px 0 4px; }
  .badge { display:inline-block; font-size:11px; padding:1px 6px; border-radius:10px; color:#fff; }
  .node circle { cursor:pointer; stroke:#fff; stroke-width:1.5px; }
  .node text { font-size:11px; pointer-events:none; }
  .link { stroke:#cbd5e1; stroke-width:1px; }
  #backlinks { margin-top:24px; border-top:1px solid #e5e7eb; padding-top:12px; }
  #backlinks a, #page a { color:#2563eb; }
  .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .filter-row label { font-size:12px; display:flex; gap:3px; align-items:center; }
  /* chatbot */
  #chat { flex:1; display:none; flex-direction:column; min-height:0; }
  #chatLog { flex:1; overflow-y:auto; padding:16px 28px; }
  .msg { margin:0 0 14px; max-width:760px; }
  .msg .who { font-size:11px; font-weight:600; text-transform:uppercase; color:#6b7280; margin-bottom:2px; }
  .msg.user .bubble { background:#eff6ff; }
  .msg .bubble { background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:8px 12px; }
  .msg .bubble a { color:#2563eb; }
  .msg .cites { font-size:12px; color:#6b7280; margin-top:6px; }
  .msg .cites a { color:#2563eb; cursor:pointer; }
  #chatBar { display:flex; gap:8px; padding:10px 28px; border-top:1px solid #e5e7eb; }
  #chatInput { flex:1; padding:8px 10px; border:1px solid #d1d5db; border-radius:6px; font:inherit; }
  #chatSettings { padding:10px 28px; border-bottom:1px solid #e5e7eb; background:#fafafa; font-size:13px; }
  #chatSettings.hidden { display:none; }
  #chatSettings label { display:inline-block; margin:2px 10px 2px 0; }
  #chatSettings input, #chatSettings select { padding:3px 6px; border:1px solid #d1d5db; border-radius:5px; font:inherit; }
  .chat-warn { color:#b45309; font-size:12px; }
</style>
</head>
<body>
<div id="sidebar">
  <strong>지식 도메인</strong>
  <div class="filter-row" id="domainFilters"></div>
  <strong style="display:block;margin-top:12px;">성숙도 (maturity)</strong>
  <div class="filter-row" id="maturityFilters"></div>
  <div id="nav"></div>
</div>
<div id="main">
  <div id="toolbar">
    <input id="search" placeholder="검색 (제목·본문)..." />
    <button id="viewGraph" class="active">그래프</button>
    <button id="viewPage">페이지</button>
    <button id="viewChat">챗봇</button>
  </div>
  <div id="content">
    <svg id="graph"></svg>
    <div id="page"></div>
    <div id="chat">
      <div id="chatSettings" class="hidden">
        <label>에이전트
          <select id="cfgProvider">
            <option value="">(선택)</option>
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI 호환</option>
          </select>
        </label>
        <label>모델 <input id="cfgModel" size="22" placeholder="예: claude-sonnet-4-6" /></label>
        <label>API 키 <input id="cfgKey" type="password" size="20" placeholder="이 브라우저에만 저장" /></label>
        <label>엔드포인트 <input id="cfgEndpoint" size="24" placeholder="(OpenAI 호환 시 base URL)" /></label>
        <button id="cfgSave">저장</button>
        <div class="chat-warn">키는 localStorage에만 저장됨(레포에 안 올라감). 브라우저 직접 호출이라 키가 클라이언트에 노출됨 — 개인/로컬 용도로만.</div>
      </div>
      <div id="chatLog"></div>
      <div id="chatBar">
        <input id="chatInput" placeholder="위키에 대해 물어봐... (예: SAM과 DETR 차이)" />
        <button id="chatSend">전송</button>
        <button id="chatGear" title="에이전트 설정">⚙</button>
      </div>
    </div>
  </div>
</div>
<script>
const COLORS = {cv:"#2563eb","physical-ai":"#16a34a",intersection:"#db2777",meta:"#6b7280"};
const MAT_COLORS = {established:"#15803d",emerging:"#b45309",speculative:"#7c3aed","(none)":"#9ca3af"};
const matKey = n => n.maturity || "(none)";
let DATA, byId, activeDomains = new Set(), activeMaturities = new Set(), searchQuery = "";

fetch("data.json").then(r=>r.json()).then(d=>{ DATA=d; init(); });

function init(){
  byId = Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
  const domains = [...new Set(DATA.nodes.map(n=>n.domain))];
  activeDomains = new Set(domains);
  const df = d3.select("#domainFilters");
  domains.forEach(dm=>{
    const l = df.append("label");
    l.append("input").attr("type","checkbox").property("checked",true)
      .on("change",function(){ this.checked?activeDomains.add(dm):activeDomains.delete(dm); renderNav(searchQuery); drawGraph(); });
    l.append("span").attr("class","badge").style("background",COLORS[dm]||"#999").text(dm);
  });
  const maturities = [...new Set(DATA.nodes.map(matKey))].sort();
  activeMaturities = new Set(maturities);
  const mf = d3.select("#maturityFilters");
  maturities.forEach(mt=>{
    const l = mf.append("label");
    l.append("input").attr("type","checkbox").property("checked",true)
      .on("change",function(){ this.checked?activeMaturities.add(mt):activeMaturities.delete(mt); renderNav(searchQuery); drawGraph(); });
    l.append("span").attr("class","badge").style("background",MAT_COLORS[mt]||"#999").text(mt);
  });
  renderNav(); drawGraph();
  d3.select("#search").on("input", function(){ filterSearch(this.value.toLowerCase()); });
  d3.select("#viewGraph").on("click",()=>show("graph"));
  d3.select("#viewPage").on("click",()=>show("page"));
  d3.select("#viewChat").on("click",()=>show("chat"));
  initChat();
}

function show(v){
  d3.select("#graph").style("display", v==="graph"?"block":"none");
  d3.select("#page").style("display", v==="page"?"block":"none");
  d3.select("#chat").style("display", v==="chat"?"flex":"none");
  d3.select("#viewGraph").classed("active",v==="graph");
  d3.select("#viewPage").classed("active",v==="page");
  d3.select("#viewChat").classed("active",v==="chat");
}

function renderNav(filter){
  const nav = d3.select("#nav"); nav.html("");
  const groups = {};
  DATA.nodes.filter(n=>activeDomains.has(n.domain) && activeMaturities.has(matKey(n)))
    .filter(n=>!filter || n.title.toLowerCase().includes(filter) || n.markdown.toLowerCase().includes(filter))
    .forEach(n=>{ (groups[n.domain]=groups[n.domain]||[]).push(n); });
  Object.keys(groups).sort().forEach(dm=>{
    nav.append("div").attr("class","group-label").text(dm);
    groups[dm].forEach(n=>{
      nav.append("div").attr("class","nav-item").text(n.title).on("click",()=>openPage(n.id));
    });
  });
}

function filterSearch(q){ searchQuery = q; renderNav(q); highlightGraph(q); }

function highlightGraph(q){
  const g = d3.select("#graph");
  g.selectAll(".node").each(function(d){
    const hit = !q || d.title.toLowerCase().includes(q) || (d.markdown||"").toLowerCase().includes(q);
    d3.select(this).style("opacity", hit?1:0.15);
  });
  g.selectAll(".link").style("opacity", q?0.1:1);
}

function openPage(id){
  const n = byId[id]; if(!n) return;
  let html = marked.parse(n.markdown);
  // rewrite relative .md links to in-app navigation
  const page = d3.select("#page").html(`<span class="badge" style="background:${COLORS[n.domain]||'#999'}">${n.domain}</span>
    ${n.maturity?` <span class="badge" style="background:#9ca3af">${n.maturity}</span>`:""}<div>${html}</div>`);
  page.selectAll("a").each(function(){
    const href = this.getAttribute("href")||"";
    if(href.endsWith(".md")){
      const resolved = resolveRel(id, href);
      if(byId[resolved]){ this.onclick = (e)=>{e.preventDefault(); openPage(resolved);}; }
    }
  });
  // backlinks
  const back = DATA.edges.filter(e=>e.target===id).map(e=>e.source);
  if(back.length){
    const bl = page.append("div").attr("id","backlinks");
    bl.append("strong").text("이 페이지를 참조하는 페이지");
    back.forEach(b=>{ bl.append("div").append("a").attr("href","#").text(byId[b].title).on("click",ev=>{ev.preventDefault();openPage(b);}); });
  }
  show("page");
}

function resolveRel(fromId, href){
  const parts = fromId.split("/"); parts.pop();
  href.split("#")[0].split("/").forEach(seg=>{
    if(seg==="..") parts.pop(); else if(seg!==".") parts.push(seg);
  });
  return parts.join("/");
}

function drawGraph(){
  const svg = d3.select("#graph"); svg.selectAll("*").remove();
  const w = svg.node().clientWidth, h = svg.node().clientHeight;
  const nodes = DATA.nodes.filter(n=>activeDomains.has(n.domain) && activeMaturities.has(matKey(n))).map(n=>({...n}));
  const ok = new Set(nodes.map(n=>n.id));
  const links = DATA.edges.filter(e=>ok.has(e.source)&&ok.has(e.target)).map(e=>({...e}));
  const deg = {}; links.forEach(l=>{deg[l.source]=(deg[l.source]||0)+1;deg[l.target]=(deg[l.target]||0)+1;});
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d=>d.id).distance(90))
    .force("charge", d3.forceManyBody().strength(-260))
    .force("center", d3.forceCenter(w/2,h/2));
  const link = svg.append("g").selectAll("line").data(links).join("line").attr("class","link");
  const node = svg.append("g").selectAll("g").data(nodes).join("g").attr("class","node")
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append("circle").attr("r",d=>6+2*(deg[d.id]||0)).attr("fill",d=>COLORS[d.domain]||"#999").on("click",(e,d)=>openPage(d.id));
  node.append("text").attr("x",10).attr("y",4).text(d=>d.title);
  sim.on("tick",()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("transform",d=>`translate(${d.x},${d.y})`);
  });
  if(searchQuery) highlightGraph(searchQuery);
}
// ---- Chatbot (Wiki Guide: read-only, answers from loaded wiki pages) ----
const LS = "llmwiki.agent";
let chatHistory = [];

function agentCfg(){
  const base = Object.assign({provider:"", model:"", endpoint:""}, window.AGENT_CONFIG||{});
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(LS)||"{}"); } catch(e){}
  return Object.assign(base, saved);   // localStorage(사용자 설정·키)가 파일 프리셋을 덮어씀
}

function initChat(){
  const c = agentCfg();
  d3.select("#cfgProvider").property("value", c.provider||"");
  d3.select("#cfgModel").property("value", c.model||"");
  d3.select("#cfgKey").property("value", c.key||"");
  d3.select("#cfgEndpoint").property("value", c.endpoint||"");
  d3.select("#cfgSave").on("click", saveCfg);
  d3.select("#chatGear").on("click", ()=>{ const s=document.getElementById("chatSettings"); s.classList.toggle("hidden"); });
  d3.select("#chatSend").on("click", sendChat);
  d3.select("#chatInput").on("keydown", function(ev){ if(ev.key==="Enter") sendChat(); });
  // 설정 미완료면 안내 + 설정 패널 자동 노출
  if(!c.provider || !c.key){
    document.getElementById("chatSettings").classList.remove("hidden");
    addMsg("system", "에이전트가 아직 설정되지 않았다. ⚙ 설정에서 **에이전트(provider)·모델·API 키**를 입력해라. (이 레포는 provider 공란으로 배포됨 — clone 후 본인 것으로 설정.)");
  }
}

function saveCfg(){
  const cfg = {
    provider: document.getElementById("cfgProvider").value.trim(),
    model: document.getElementById("cfgModel").value.trim(),
    key: document.getElementById("cfgKey").value.trim(),
    endpoint: document.getElementById("cfgEndpoint").value.trim(),
  };
  localStorage.setItem(LS, JSON.stringify(cfg));
  document.getElementById("chatSettings").classList.add("hidden");
  addMsg("system", "설정 저장됨 (이 브라우저 localStorage). 이제 질문해라.");
}

function retrieve(q, k){
  const terms = q.toLowerCase().split(/\s+/).filter(t=>t.length>1);
  return DATA.nodes.map(n=>{
    const title=n.title.toLowerCase(), body=(n.markdown||"").toLowerCase();
    let s=0; terms.forEach(t=>{ if(title.includes(t)) s+=3; if(body.includes(t)) s+=1; });
    return {n,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,k||4).map(x=>x.n);
}

function buildContext(pages){
  return pages.map(p=>`# ${p.title}  (id: ${p.id})\n${(p.markdown||"").slice(0,1800)}`).join("\n\n---\n\n");
}

const SYS = "너는 이 LLM Wiki의 Wiki Guide다. 아래 제공된 위키 페이지 내용만 근거로 한국어로 답한다. 위키에 없으면 '위키에 없음'이라고 명시한다. 추측을 사실처럼 단정하지 않는다. 답 끝에 근거로 쓴 페이지 제목을 적는다.";

async function callProvider(cfg, question, context){
  const userMsg = `질문: ${question}\n\n참고 위키 페이지:\n\n${context||"(관련 페이지 없음)"}`;
  if(cfg.provider==="anthropic"){
    const r = await fetch((cfg.endpoint||"https://api.anthropic.com")+"/v1/messages",{
      method:"POST",
      headers:{ "content-type":"application/json", "x-api-key":cfg.key,
        "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({ model:cfg.model||"claude-sonnet-4-6", max_tokens:1024, system:SYS,
        messages:[{role:"user",content:userMsg}] })
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error?.message || JSON.stringify(j));
    return j.content.map(b=>b.text||"").join("");
  }
  if(cfg.provider==="openai"){
    const r = await fetch((cfg.endpoint||"https://api.openai.com")+"/v1/chat/completions",{
      method:"POST",
      headers:{ "content-type":"application/json", "authorization":"Bearer "+cfg.key },
      body: JSON.stringify({ model:cfg.model||"gpt-4o-mini",
        messages:[{role:"system",content:SYS},{role:"user",content:userMsg}] })
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error?.message || JSON.stringify(j));
    return j.choices[0].message.content;
  }
  throw new Error("지원하지 않는 provider: '"+cfg.provider+"'. ⚙ 설정에서 anthropic 또는 openai 선택.");
}

function addMsg(who, markdown, cites){
  const log = document.getElementById("chatLog");
  const wrap = document.createElement("div");
  wrap.className = "msg " + (who==="user"?"user":who==="system"?"system":"bot");
  const label = who==="user"?"나":who==="system"?"안내":"Wiki Guide";
  wrap.innerHTML = `<div class="who">${label}</div><div class="bubble">${marked.parse(markdown)}</div>`;
  if(cites && cites.length){
    const c = document.createElement("div"); c.className="cites";
    c.append("근거: ");
    cites.forEach((p,i)=>{ const a=document.createElement("a"); a.textContent=p.title;
      a.onclick=()=>openPage(p.id); c.appendChild(a); if(i<cites.length-1) c.append(" · "); });
    wrap.querySelector(".bubble").appendChild(c);
  }
  log.appendChild(wrap); log.scrollTop = log.scrollHeight;
  return wrap;
}

async function sendChat(){
  const input = document.getElementById("chatInput");
  const q = input.value.trim(); if(!q) return;
  const cfg = agentCfg();
  if(!cfg.provider || !cfg.key){
    document.getElementById("chatSettings").classList.remove("hidden");
    addMsg("system","먼저 ⚙ 설정에서 에이전트와 API 키를 입력해라."); return;
  }
  input.value="";
  addMsg("user", q);
  const pages = retrieve(q, 4);
  const thinking = addMsg("bot", "_생각 중..._");
  try {
    const ans = await callProvider(cfg, q, buildContext(pages));
    thinking.remove();
    addMsg("bot", ans, pages);
  } catch(e){
    thinking.remove();
    addMsg("system", "호출 실패: " + e.message);
  }
}

window.addEventListener("resize",()=>{ if(d3.select("#graph").style("display")!=="none") drawGraph(); });
</script>
</body>
</html>
